services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-site_engineer_management}
      POSTGRES_USER: ${POSTGRES_USER:-site_engineer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-site_engineer_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-site_engineer} -d ${POSTGRES_DB:-site_engineer_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    command: sh -c "python manage.py migrate && python manage.py seed_phase1 && gunicorn site_engineer_system.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      POSTGRES_DB: ${POSTGRES_DB:-site_engineer_management}
      POSTGRES_USER: ${POSTGRES_USER:-site_engineer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-site_engineer_password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ATTACHMENT_MAX_FILE_SIZE_MB: ${ATTACHMENT_MAX_FILE_SIZE_MB:-10}
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_media:
